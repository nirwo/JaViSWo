<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cockpit M1</title>
    <style>
      :root {
        --bg: #0a0d12;
        --panel: #0e1218;
        --border: #1a1f2a;
        --text: #d4d8e0;
        --muted: #94a3b8;
        --accent: #5eead4;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, sans-serif; }
      header { padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
      h1 { font-size: 14px; margin: 0; color: var(--accent); }
      main { display: grid; grid-template-rows: auto 1fr; height: calc(100vh - 50px); }
      form { display: flex; flex-direction: column; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
      .form-row { display: flex; gap: 8px; }
      input, textarea, button { font: inherit; color: inherit; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
      textarea { flex: 1; resize: none; min-height: 60px; }
      button { background: var(--accent); color: var(--bg); border: none; cursor: pointer; font-weight: 600; }
      button:disabled { opacity: 0.5; cursor: wait; }

      /* Slim status rows (no border, no padding) */
      .streamrow { padding: 4px 8px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; }
      .streamrow.system_init { color: var(--accent); }
      .streamrow.result { color: var(--muted); border-top: 1px dotted var(--border); border-bottom: 1px dotted var(--border); margin: 8px 0; padding: 6px 8px; }
      .streamrow.exit { color: var(--muted); font-style: italic; }
      .streamrow.stderr { color: #fb7185; }
      .streamrow.system { color: var(--muted); font-style: italic; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; padding: 4px 8px; }

      /* Bubble cards */
      .bubble { margin: 6px 0; padding: 10px 14px; border-radius: 10px; max-width: 80%; cursor: pointer; transition: background 120ms ease, border-color 120ms ease; }
      .bubble.kind-thinking { border: 1px dashed var(--border); color: var(--muted); font-style: italic; background: rgba(94,234,212,0.03); }
      .bubble.kind-tool_use { border: 1px solid #fbbf24; background: rgba(251,191,36,0.05); font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; }
      .bubble.kind-text { border: 1px solid var(--accent); background: rgba(94,234,212,0.06); margin-left: auto; }
      .bubble.kind-tool_result { border: 1px solid var(--muted); background: rgba(148,163,184,0.05); font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; }
      .bubble:hover { background: rgba(94,234,212,0.1); }
      .bubble.expanded { background: rgba(94,234,212,0.12); }

      .bubble .bubble-header { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
      .bubble .bubble-body { font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: var(--text); }
      .bubble .bubble-icon { margin-right: 6px; }
      .bubble .card-raw { margin-top: 8px; padding: 8px; background: #050709; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; color: var(--muted); overflow: auto; max-height: 200px; white-space: pre; }
      .bubble:not(.expanded) .card-raw { display: none; }

      /* ── chip ── */
      .chip {
        width: 100%;
        text-align: left;
        padding: 10px 14px;
        min-height: 44px;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
      }
      .chip:hover, .chip:focus { border-color: var(--accent); outline: none; }
      .chip[data-selected="true"] { border-color: var(--accent); }
      .chip .chip-icon { margin-right: 8px; }
      .chip .chip-name { font-weight: 600; }
      .chip .chip-meta { color: var(--muted); margin-left: 8px; font-size: 11px; }
      .chip .chip-arrow { margin-left: auto; color: var(--muted); }

      /* ── modal ── */
      .modal.hidden { display: none; }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
      .modal-panel {
        position: relative;
        width: 100%;
        max-width: 480px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      .modal-header h2 { margin: 0; font-size: 14px; color: var(--accent); }
      .modal-close {
        background: transparent;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 18px;
        padding: 4px 8px;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-close:hover, .modal-close:focus { color: var(--text); outline: none; }
      .modal-search { padding: 12px 18px; border-bottom: 1px solid var(--border); }
      .modal-search input {
        width: 100%;
        padding: 8px 12px;
        min-height: 40px;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      .modal-search input:focus { border-color: var(--accent); outline: none; }
      .modal-body { overflow: auto; padding: 8px 0; flex: 1; }

      /* ── picker rows ── */
      .picker-section-label {
        padding: 12px 18px 4px;
        font-size: 10px;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.5px;
      }
      .picker-row {
        display: flex;
        align-items: center;
        padding: 12px 18px;
        min-height: 44px;
        cursor: pointer;
        border: none;
        background: transparent;
        width: 100%;
        text-align: left;
        color: var(--text);
        font: inherit;
      }
      .picker-row:hover, .picker-row:focus { background: rgba(94,234,212,0.08); outline: none; }
      .picker-row .picker-icon { margin-right: 10px; font-size: 14px; }
      .picker-row .picker-name { flex: 1; }
      .picker-row .picker-meta { color: var(--muted); font-size: 11px; margin-left: 8px; }
      .picker-row .picker-badge { margin-left: 8px; }
      .picker-row .picker-arrow { color: var(--muted); margin-left: 8px; }
      .picker-back {
        padding: 10px 18px;
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--border);
        width: 100%;
        text-align: left;
        min-height: 44px;
        display: flex;
        align-items: center;
        font: inherit;
      }
      .picker-back:hover, .picker-back:focus { color: var(--text); outline: none; }
      .picker-back .picker-back-arrow { margin-right: 8px; }

      @media (max-width: 479px) {
        .modal { padding: 0; }
        .modal-panel { max-width: 100%; max-height: 100vh; border-radius: 0; height: 100vh; }
      }

      /* ── Stage wrap (replaces #stream) ── */
      #stageWrap {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      #stageHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        min-height: 40px;
      }
      #stageCount { color: var(--muted); font-size: 11px; }
      #backToGrid {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--accent);
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
        font-size: 11px;
        min-height: 28px;
      }
      #backToGrid:hover { background: rgba(94,234,212,0.08); }

      #stage {
        flex: 1;
        display: grid;
        gap: 10px;
        padding: 10px;
        overflow: auto;
        min-height: 0;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
      }
      #stage[data-count="2"] { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
      #stage[data-count="3"], #stage[data-count="4"] { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
      #stage[data-count="5"], #stage[data-count="6"], #stage[data-count="7"], #stage[data-count="8"], #stage[data-count="9"] { grid-template-columns: 1fr 1fr 1fr; grid-auto-rows: minmax(220px, 1fr); }

      #stage[data-focused] .agent-tile:not(.focused) { display: none; }
      #stage[data-focused] .agent-tile.focused { grid-column: 1 / -1; grid-row: 1 / -1; }

      .agent-tile {
        position: relative;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        cursor: pointer;
        animation: tile-fadein 240ms cubic-bezier(0.4, 0, 0.2, 1) both;
        will-change: transform;
      }
      .agent-tile:hover:not(.focused) { border-color: var(--accent); }
      .agent-tile.focused { cursor: default; border-color: var(--accent); }

      @keyframes tile-fadein {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }

      .agent-tile-header {
        padding: 8px 12px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 11px;
        min-height: 36px;
      }
      .agent-tile-name { font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .agent-tile-meta { color: var(--muted); flex-shrink: 0; }

      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        position: relative;
      }
      .status-dot.running { background: var(--accent); animation: dot-pulse 1.4s ease-in-out infinite; }
      .status-dot.completed { background: var(--accent); }
      .status-dot.errored { background: #fb7185; }

      @keyframes dot-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(94,234,212,0.5); }
        70% { box-shadow: 0 0 0 8px rgba(94,234,212,0); }
      }

      .agent-tile-stream {
        flex: 1;
        overflow: auto;
        padding: 10px 14px;
        min-height: 0;
      }

      .agent-tile-footer-hint {
        padding: 6px 12px;
        text-align: center;
        font-size: 10px;
        color: var(--muted);
        border-top: 1px dashed var(--border);
        pointer-events: none;
      }
      .agent-tile.focused .agent-tile-footer-hint { display: none; }

      /* Mobile: tiles always stack on small screens */
      @media (max-width: 640px) {
        #stage[data-count] { grid-template-columns: 1fr; }
        #stage[data-count="3"], #stage[data-count="4"], #stage[data-count="5"],
        #stage[data-count="6"], #stage[data-count="7"], #stage[data-count="8"], #stage[data-count="9"] {
          grid-template-columns: 1fr;
          grid-template-rows: auto;
        }
      }
    </style>
  </head>
  <body>
    <header><h1>⌘ Cockpit · M1</h1></header>
    <main>
      <form id="spawn">
        <button
          type="button"
          id="projectChip"
          class="chip"
          aria-haspopup="dialog"
          aria-controls="pickerModal"
        ></button>
        <div class="form-row">
          <textarea id="prompt" placeholder="Prompt for the agent…" required></textarea>
          <button type="submit" id="sendBtn" disabled>Send</button>
        </div>
      </form>

      <section id="stageWrap">
        <div id="stageHeader">
          <button type="button" id="backToGrid" hidden>← all agents (<span id="backCount">0</span>)</button>
          <div id="stageCount" class="muted-text">0 agents</div>
        </div>
        <div id="stage" data-count="0"></div>
      </section>

      <!-- Folder-picker modal — populated entirely by JS via createElement + textContent -->
      <div id="pickerModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
        <div class="modal-backdrop" data-close></div>
        <div class="modal-panel">
          <header class="modal-header">
            <h2 id="pickerTitle">Pick a project</h2>
            <button type="button" class="modal-close" data-close aria-label="Close picker">✕</button>
          </header>
          <div class="modal-search">
            <input type="search" id="pickerSearch" placeholder="filter…" autocomplete="off" />
          </div>
          <div id="pickerBody" class="modal-body"></div>
        </div>
      </div>
    </main>
    <script>
      const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
      const stage = document.getElementById('stage');
      const backBtn = document.getElementById('backToGrid');
      const backCount = document.getElementById('backCount');
      const form = document.getElementById('spawn');
      const promptInput = document.getElementById('prompt');
      const sendBtn = document.getElementById('sendBtn');
      const projectChip = document.getElementById('projectChip');
      const pickerModal = document.getElementById('pickerModal');
      const pickerSearch = document.getElementById('pickerSearch');
      const pickerBody = document.getElementById('pickerBody');

      // ── module-level state ──────────────────────────────────────────────────
      let currentProject = null; // { path, name, hasDesignMd }
      let pickerState = { view: 'top', root: null, data: null };

      const agents = new Map(); // agentId -> { tile, streamEl, name, status, tokens, cost }
      const agentTextCard = new Map(); // agentId -> current assistant text card element (or null)
      const pendingPrompts = new Map(); // agentId -> prompt slug (set before first envelope arrives)
      let focusedAgentId = null;

      // ── stage / tile management ─────────────────────────────────────────────
      function ensureAgentTile(agentId) {
        let entry = agents.get(agentId);
        if (entry) return entry;

        const tile = document.createElement('section');
        tile.className = 'agent-tile';
        tile.dataset.agentId = agentId;

        const tileHeader = document.createElement('header');
        tileHeader.className = 'agent-tile-header';

        const dot = document.createElement('span');
        dot.className = 'status-dot running';
        dot.setAttribute('aria-label', 'running');

        const nameEl = document.createElement('span');
        nameEl.className = 'agent-tile-name';
        nameEl.textContent = pendingPrompts.get(agentId) ?? agentId.slice(0, 12);

        const metaEl = document.createElement('span');
        metaEl.className = 'agent-tile-meta';
        metaEl.textContent = '…';

        tileHeader.append(dot, nameEl, metaEl);

        const streamEl = document.createElement('div');
        streamEl.className = 'agent-tile-stream';

        const hint = document.createElement('div');
        hint.className = 'agent-tile-footer-hint';
        hint.textContent = 'tap to focus';

        tile.append(tileHeader, streamEl, hint);

        tile.addEventListener('click', (ev) => {
          if (ev.target.closest('.bubble')) return;
          if (focusedAgentId === agentId) return;
          focusAgent(agentId);
        });

        stage.appendChild(tile);

        entry = { tile, streamEl, name: nameEl.textContent, status: 'running', tokens: 0, cost: 0 };
        agents.set(agentId, entry);
        updateStageCount();
        return entry;
      }

      function updateStageCount() {
        const n = agents.size;
        stage.dataset.count = String(Math.min(n, 9));
        const label = document.getElementById('stageCount');
        if (n === 0) label.textContent = '0 agents';
        else if (n === 1) label.textContent = '1 agent';
        else label.textContent = `${n} agents`;
      }

      // ── FLIP zoom animations ────────────────────────────────────────────────
      function focusAgent(agentId) {
        const entry = agents.get(agentId);
        if (!entry) return;

        // FIRST: measure tile's current rect (grid position)
        const first = entry.tile.getBoundingClientRect();

        // LAST: apply focused state — CSS expands tile to fill stage
        focusedAgentId = agentId;
        document.body.dataset.focused = 'true';
        stage.dataset.focused = agentId;
        entry.tile.classList.add('focused');
        backCount.textContent = String(agents.size);
        backBtn.hidden = false;

        const last = entry.tile.getBoundingClientRect();

        // INVERT: compute transform that makes tile visually start at first position
        const dx = first.left - last.left;
        const dy = first.top - last.top;
        const sx = first.width / last.width;
        const sy = first.height / last.height;

        entry.tile.style.transformOrigin = '0 0';
        entry.tile.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
        entry.tile.style.transition = 'none';
        // Force layout flush
        void entry.tile.offsetWidth;

        // PLAY: animate to natural (final) position
        entry.tile.style.transition = 'transform 320ms cubic-bezier(0.4, 0, 0.2, 1)';
        entry.tile.style.transform = '';

        const cleanup = () => {
          entry.tile.style.transition = '';
          entry.tile.style.transformOrigin = '';
        };
        entry.tile.addEventListener('transitionend', cleanup, { once: true });
      }

      function unfocusAgent() {
        if (!focusedAgentId) return;
        const entry = agents.get(focusedAgentId);
        if (!entry) {
          document.body.dataset.focused = '';
          delete stage.dataset.focused;
          focusedAgentId = null;
          backBtn.hidden = true;
          return;
        }

        // FIRST: focused rect (big/expanded position)
        const first = entry.tile.getBoundingClientRect();

        // LAST: remove focused state — tile snaps back to grid
        entry.tile.classList.remove('focused');
        document.body.dataset.focused = '';
        delete stage.dataset.focused;
        focusedAgentId = null;
        backBtn.hidden = true;

        const last = entry.tile.getBoundingClientRect();

        const dx = first.left - last.left;
        const dy = first.top - last.top;
        const sx = first.width / last.width;
        const sy = first.height / last.height;

        entry.tile.style.transformOrigin = '0 0';
        entry.tile.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
        entry.tile.style.transition = 'none';
        void entry.tile.offsetWidth;

        entry.tile.style.transition = 'transform 320ms cubic-bezier(0.4, 0, 0.2, 1)';
        entry.tile.style.transform = '';

        const cleanup = () => {
          entry.tile.style.transition = '';
          entry.tile.style.transformOrigin = '';
        };
        entry.tile.addEventListener('transitionend', cleanup, { once: true });
      }

      backBtn.addEventListener('click', unfocusAgent);

      // ── websocket ───────────────────────────────────────────────────────────
      let ws;
      function connect() {
        ws = new WebSocket(wsUrl);
        ws.onopen = () => appendSystem('WS connected');
        ws.onclose = () => { appendSystem('WS closed, retry in 2s'); setTimeout(connect, 2000); };
        ws.onerror = () => appendSystemErr('WS error');
        ws.onmessage = (ev) => {
          let env;
          try { env = JSON.parse(ev.data); } catch { return; }
          renderEnvelope(env);
        };
      }
      connect();

      // ── stream rendering ────────────────────────────────────────────────────
      // All DOM writes use createElement + textContent — NEVER innerHTML.
      // Agent output is fully untrusted; treating it as plain text is the only safe move.

      // Internal system messages (WS connect/disconnect/error) — no agentId, show in a floating row
      function appendSystem(text) {
        // Find the first tile stream to show system messages, or create a detached row
        // For simplicity, if there's a focused agent, show in that tile; else broadcast to all
        const targetEntry = focusedAgentId
          ? agents.get(focusedAgentId)
          : agents.values().next().value;
        if (targetEntry) {
          const fakeEnv = { kind: 'system', agentId: null, payload: { text } };
          renderSlimRow(fakeEnv, `[system] ${String(text ?? '')}`, targetEntry.streamEl);
        }
        // If no tiles yet, silently discard (or could show in stageHeader — kept minimal)
      }

      function appendSystemErr(text) {
        const targetEntry = focusedAgentId
          ? agents.get(focusedAgentId)
          : agents.values().next().value;
        if (targetEntry) {
          const fakeEnv = { kind: 'stderr', agentId: null, payload: { text } };
          renderSlimRow(fakeEnv, `[error] ${String(text ?? '')}`, targetEntry.streamEl);
        }
      }

      function renderEnvelope(env) {
        const entry = ensureAgentTile(env.agentId);
        const tileStream = entry.streamEl;

        // Slim rows for these kinds
        if (env.kind === 'system_init') {
          const p = env.payload ?? {};
          renderSlimRow(env, `⌘ ${p.model ?? '?'} @ ${p.cwd ?? '?'}`, tileStream);
          return;
        }
        if (env.kind === 'result') {
          const p = env.payload ?? {};
          const usage = p.usage ?? {};
          const totalTokens = (usage.input_tokens ?? 0) + (usage.output_tokens ?? 0);
          renderSlimRow(env, `✓ ${usage.input_tokens ?? 0} in · ${usage.output_tokens ?? 0} out · $${(p.total_cost_usd ?? 0).toFixed(4)} · ${p.duration_ms ?? 0}ms`, tileStream);
          // Update tile header metadata
          const metaEl = entry.tile.querySelector('.agent-tile-meta');
          metaEl.textContent = `${totalTokens} tk · $${(p.total_cost_usd ?? 0).toFixed(3)}`;
          const dot = entry.tile.querySelector('.status-dot');
          dot.className = 'status-dot completed';
          dot.setAttribute('aria-label', 'completed');
          return;
        }
        if (env.kind === 'exit') {
          renderSlimRow(env, `× exit ${env.payload?.code ?? '?'}`, tileStream);
          if ((env.payload?.code ?? 0) !== 0) {
            const dot = entry.tile.querySelector('.status-dot');
            dot.className = 'status-dot errored';
            dot.setAttribute('aria-label', 'errored');
            const metaEl = entry.tile.querySelector('.agent-tile-meta');
            metaEl.textContent = `exit ${env.payload?.code ?? '?'}`;
          }
          return;
        }
        if (env.kind === 'stderr') {
          renderSlimRow(env, env.payload?.text ?? '', tileStream);
          return;
        }

        // partial_text → aggregate into current assistant card for this agent
        if (env.kind === 'partial_text') {
          let card = agentTextCard.get(env.agentId);
          if (!card) {
            card = makeBubble(env, '', 'text', 'assistant');
            agentTextCard.set(env.agentId, card);
            tileStream.appendChild(card);
          }
          const body = card.querySelector('.bubble-body');
          body.textContent += env.payload?.delta ?? '';
          autoScroll(tileStream);
          return;
        }

        // text → finalize the current assistant card OR create one with full text
        if (env.kind === 'text') {
          let card = agentTextCard.get(env.agentId);
          if (!card) {
            card = makeBubble(env, env.payload?.text ?? '', 'text', 'assistant');
            tileStream.appendChild(card);
          } else {
            const body = card.querySelector('.bubble-body');
            body.textContent = env.payload?.text ?? '';
            card.dataset.envelope = JSON.stringify(env);
          }
          agentTextCard.set(env.agentId, null); // close — next partial creates new card
          autoScroll(tileStream);
          return;
        }

        // Any other kind closes the assistant card and starts a new bubble
        agentTextCard.set(env.agentId, null);

        if (env.kind === 'thinking') {
          const card = makeBubble(env, env.payload?.thinking ?? '', 'thinking', '💭 thinking');
          tileStream.appendChild(card);
          autoScroll(tileStream);
          return;
        }
        if (env.kind === 'tool_use') {
          const name = env.payload?.name ?? '?';
          const inputStr = JSON.stringify(env.payload?.input ?? {}, null, 2);
          const card = makeBubble(env, inputStr, 'tool_use', `🛠 ${name}`);
          tileStream.appendChild(card);
          autoScroll(tileStream);
          return;
        }
        if (env.kind === 'tool_result') {
          const content = env.payload?.content ?? '';
          const bodyText = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
          const card = makeBubble(env, bodyText, 'tool_result', '↩ result');
          tileStream.appendChild(card);
          autoScroll(tileStream);
          return;
        }

        // Unknown kind — fallback slim row
        renderSlimRow(env, `${env.kind}: ${JSON.stringify(env.payload ?? {})}`, tileStream);
      }

      function makeBubble(env, bodyText, kindClass, headerLabel) {
        const card = document.createElement('div');
        const safeClass = String(kindClass).replace(/[^a-z_]/gi, '_');
        card.className = `bubble kind-${safeClass}`;
        card.dataset.envelope = JSON.stringify(env);

        const header = document.createElement('div');
        header.className = 'bubble-header';
        header.textContent = headerLabel;
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'bubble-body';
        body.textContent = String(bodyText ?? '');
        card.appendChild(body);

        card.addEventListener('click', () => toggleExpand(card));
        return card;
      }

      function toggleExpand(card) {
        if (card.classList.contains('expanded')) {
          card.classList.remove('expanded');
          const raw = card.querySelector('.card-raw');
          if (raw) raw.remove();
        } else {
          card.classList.add('expanded');
          const raw = document.createElement('pre');
          raw.className = 'card-raw';
          try {
            raw.textContent = JSON.stringify(JSON.parse(card.dataset.envelope), null, 2);
          } catch {
            raw.textContent = '(raw envelope unavailable)';
          }
          card.appendChild(raw);
        }
      }

      function renderSlimRow(env, label, tileStream) {
        const row = document.createElement('div');
        const safeKind = String(env.kind).replace(/[^a-z_]/gi, '_');
        row.className = `streamrow ${safeKind}`;
        row.textContent = label;
        tileStream.appendChild(row);
        autoScroll(tileStream);
      }

      function autoScroll(tileStream) {
        const THRESHOLD = 50;
        const atBottom = tileStream.scrollTop + tileStream.clientHeight >= tileStream.scrollHeight - THRESHOLD;
        if (atBottom) tileStream.scrollTop = tileStream.scrollHeight;
      }

      // ── relative time ───────────────────────────────────────────────────────
      function fmtRelative(ts) {
        const SECOND = 1000;
        const MINUTE = 60 * SECOND;
        const HOUR = 60 * MINUTE;
        const DAY = 24 * HOUR;
        const WEEK = 7 * DAY;
        const delta = Date.now() - ts;
        if (delta < 60 * SECOND) return 'just now';
        if (delta < 60 * MINUTE) return `${Math.floor(delta / MINUTE)}m ago`;
        if (delta < 24 * HOUR) return `${Math.floor(delta / HOUR)}h ago`;
        if (delta < WEEK) return `${Math.floor(delta / DAY)}d ago`;
        const d = new Date(ts);
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      }

      // ── chip state ──────────────────────────────────────────────────────────
      function setSelectedProject(path, name, hasDesignMd) {
        currentProject = { path, name, hasDesignMd };
        sendBtn.disabled = false;
        projectChip.setAttribute('data-selected', 'true');
        // Rebuild chip using textContent only
        while (projectChip.firstChild) projectChip.removeChild(projectChip.firstChild);

        const iconSpan = document.createElement('span');
        iconSpan.className = 'chip-icon';
        iconSpan.textContent = '📁';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'chip-name';
        nameSpan.textContent = name;

        projectChip.appendChild(iconSpan);
        projectChip.appendChild(nameSpan);

        if (hasDesignMd) {
          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'chip-meta';
          badgeSpan.textContent = '🎨';
          projectChip.appendChild(badgeSpan);
        }

        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'chip-arrow';
        arrowSpan.textContent = 'change ▾';
        projectChip.appendChild(arrowSpan);
      }

      function renderChipEmpty() {
        sendBtn.disabled = true;
        projectChip.removeAttribute('data-selected');
        while (projectChip.firstChild) projectChip.removeChild(projectChip.firstChild);

        const iconSpan = document.createElement('span');
        iconSpan.className = 'chip-icon';
        iconSpan.textContent = '📁';

        const labelSpan = document.createElement('span');
        labelSpan.style.color = 'var(--muted)';
        labelSpan.textContent = 'Pick a project…';

        projectChip.appendChild(iconSpan);
        projectChip.appendChild(labelSpan);
      }

      // ── modal open / close ──────────────────────────────────────────────────
      async function openPicker() {
        pickerModal.classList.remove('hidden');
        pickerSearch.value = '';
        pickerState = { view: 'top', root: null, data: null };

        // Fetch roots and recents in parallel
        try {
          const [rootsRes, recentRes] = await Promise.all([
            fetch('/api/projects/roots'),
            fetch('/api/projects/recent'),
          ]);
          const rootsData = await rootsRes.json();
          const recentData = await recentRes.json();
          const combined = {
            roots: rootsData.roots ?? [],
            recent: recentData.recent ?? [],
          };
          pickerState.data = combined;
          renderTopView(combined, '');
        } catch (err) {
          renderError('Failed to load projects');
        }

        pickerSearch.focus();
      }

      function closePicker() {
        pickerModal.classList.add('hidden');
        projectChip.focus();
      }

      // ── render helpers ──────────────────────────────────────────────────────
      function clearBody() {
        while (pickerBody.firstChild) pickerBody.removeChild(pickerBody.firstChild);
      }

      function makeSectionLabel(text) {
        const div = document.createElement('div');
        div.className = 'picker-section-label';
        div.textContent = text;
        return div;
      }

      function makePickerRow(icon, name, meta, badge, arrow) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'picker-row';

        const iconSpan = document.createElement('span');
        iconSpan.className = 'picker-icon';
        iconSpan.textContent = icon;
        btn.appendChild(iconSpan);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'picker-name';
        nameSpan.textContent = name;
        btn.appendChild(nameSpan);

        if (meta) {
          const metaSpan = document.createElement('span');
          metaSpan.className = 'picker-meta';
          metaSpan.textContent = meta;
          btn.appendChild(metaSpan);
        }

        if (badge) {
          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'picker-badge';
          badgeSpan.textContent = badge;
          btn.appendChild(badgeSpan);
        }

        if (arrow) {
          const arrowSpan = document.createElement('span');
          arrowSpan.className = 'picker-arrow';
          arrowSpan.textContent = arrow;
          btn.appendChild(arrowSpan);
        }

        return btn;
      }

      function renderError(message) {
        clearBody();
        const p = document.createElement('p');
        p.style.padding = '16px 18px';
        p.style.color = '#fb7185';
        p.textContent = message;
        pickerBody.appendChild(p);
      }

      function renderTopView(data, filter) {
        clearBody();
        const q = filter.toLowerCase();
        const { roots = [], recent = [] } = data;

        // Recents section
        const filteredRecent = recent.filter(
          (r) => !q || r.name.toLowerCase().includes(q)
        );
        if (filteredRecent.length > 0) {
          pickerBody.appendChild(makeSectionLabel('Recent'));
          for (const item of filteredRecent) {
            const row = makePickerRow(
              '📁',
              item.name,
              fmtRelative(item.ts),
              item.hasDesignMd ? '🎨' : null,
              null,
            );
            row.addEventListener('click', () => {
              setSelectedProject(item.path, item.name, item.hasDesignMd);
              closePicker();
              promptInput.focus();
            });
            pickerBody.appendChild(row);
          }
        }

        // Browse section
        const filteredRoots = roots.filter(
          (r) => !q || r.name.toLowerCase().includes(q)
        );
        if (filteredRoots.length > 0) {
          pickerBody.appendChild(makeSectionLabel('Browse'));
          for (const root of filteredRoots) {
            const row = makePickerRow('📂', root.name + '/', null, null, '→');
            row.addEventListener('click', () => drillInto(root.path, root.name));
            pickerBody.appendChild(row);
          }
        }

        if (filteredRecent.length === 0 && filteredRoots.length === 0) {
          const empty = document.createElement('p');
          empty.style.padding = '16px 18px';
          empty.style.color = 'var(--muted)';
          empty.textContent = 'No results.';
          pickerBody.appendChild(empty);
        }
      }

      function renderDrilledView(drillData, filter) {
        clearBody();
        const q = filter.toLowerCase();
        const { root, folders = [] } = drillData;

        // Back button / breadcrumb
        const drillBackBtn = document.createElement('button');
        drillBackBtn.type = 'button';
        drillBackBtn.className = 'picker-back';

        const backArrow = document.createElement('span');
        backArrow.className = 'picker-back-arrow';
        backArrow.textContent = '⬅';
        drillBackBtn.appendChild(backArrow);

        const breadcrumb = document.createElement('span');
        breadcrumb.textContent = root;
        drillBackBtn.appendChild(breadcrumb);

        drillBackBtn.addEventListener('click', () => {
          pickerState = { view: 'top', root: null, data: pickerState.topData ?? pickerState.data };
          renderTopView(pickerState.data, pickerSearch.value);
        });
        pickerBody.appendChild(drillBackBtn);

        const filteredFolders = folders.filter(
          (f) => !q || f.name.toLowerCase().includes(q)
        );

        for (const folder of filteredFolders) {
          const row = makePickerRow(
            '📁',
            folder.name,
            null,
            folder.hasDesignMd ? '🎨' : null,
            null,
          );
          row.addEventListener('click', () => {
            setSelectedProject(folder.path, folder.name, folder.hasDesignMd);
            closePicker();
            promptInput.focus();
          });
          pickerBody.appendChild(row);
        }

        if (filteredFolders.length === 0) {
          const empty = document.createElement('p');
          empty.style.padding = '16px 18px';
          empty.style.color = 'var(--muted)';
          empty.textContent = 'No matching folders.';
          pickerBody.appendChild(empty);
        }
      }

      async function drillInto(rootPath, rootName) {
        try {
          const res = await fetch(`/api/projects/list?root=${encodeURIComponent(rootPath)}`);
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            renderError(`Error ${res.status}: ${body.error ?? 'Failed to list folders'}`);
            return;
          }
          const drillData = await res.json();
          pickerState = {
            view: 'drilled',
            root: rootPath,
            data: drillData,
            topData: pickerState.data,
          };
          renderDrilledView(drillData, pickerSearch.value);
        } catch (err) {
          renderError('Failed to list folders');
        }
      }

      // ── search filter ───────────────────────────────────────────────────────
      pickerSearch.addEventListener('input', () => {
        const filter = pickerSearch.value;
        if (pickerState.view === 'top' && pickerState.data) {
          renderTopView(pickerState.data, filter);
        } else if (pickerState.view === 'drilled' && pickerState.data) {
          renderDrilledView(pickerState.data, filter);
        }
      });

      // ── wire triggers ───────────────────────────────────────────────────────
      projectChip.addEventListener('click', openPicker);

      // data-close elements: backdrop + ✕ button
      pickerModal.addEventListener('click', (ev) => {
        if (ev.target.closest('[data-close]')) closePicker();
      });

      document.addEventListener('keydown', (ev) => {
        if (ev.key !== 'Escape') return;
        // Priority order: picker → expanded bubble → focused agent
        if (!pickerModal.classList.contains('hidden')) {
          closePicker();
          return;
        }
        const expandedBubbles = document.querySelectorAll('.bubble.expanded');
        if (expandedBubbles.length > 0) {
          expandedBubbles.forEach((el) => toggleExpand(el));
          return;
        }
        if (focusedAgentId) {
          unfocusAgent();
        }
      });

      // ── form submit ─────────────────────────────────────────────────────────
      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        if (!currentProject) return;
        sendBtn.disabled = true;
        const projectPath = currentProject.path;
        const prompt = promptInput.value.trim();
        const slug = prompt.slice(0, 30).trim() + (prompt.length > 30 ? '…' : '');
        try {
          const r = await fetch('/api/agents', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ projectPath, prompt }),
          });
          const body = await r.json();
          if (!r.ok) {
            appendSystemErr(JSON.stringify(body));
            return;
          }
          const agentId = body.agentId;
          pendingPrompts.set(agentId, slug);
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ resume: { agentId, sinceSeq: -1 } }));
          } else {
            appendSystemErr(`WS not open (state=${ws.readyState}); subscription lost — reconnect and retry`);
          }
        } finally {
          sendBtn.disabled = false;
        }
      });

      // ── initial render ──────────────────────────────────────────────────────
      renderChipEmpty();
    </script>
  </body>
</html>
