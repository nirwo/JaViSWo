# JaViSWo — Pi-hole DNS + optional nginx reverse proxy
#
# Pi-hole replaces the previous dnsmasq + AdGuard combo. It owns:
#   - DNS resolution for javiswo.local / cockpit.local / jarvis.local
#     (custom DNS records, populated from pihole/custom.list by up.sh)
#   - Filtering: family-safe upstream (Cloudflare 1.1.1.3 + 1.0.0.3),
#     plus Pi-hole's own blocklists (configurable in the admin UI)
#   - Stats and web admin on http://localhost:8053/admin/
#
# Pi-hole uses dnsmasq internally — so all the LAN-local forwarding,
# caching, and per-domain server logic still works. The win is built-in
# blocklist management + web UI + active maintenance.
#
# Optional: bring up nginx on 443 with `--profile nginx`.

services:
  dns:
    image: pihole/pihole:2025.10.0
    container_name: javiswo-pihole
    hostname: javiswo-pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # Web admin UI. Pi-hole serves on container port 80; we map to 8053
      # so it doesn't clash with nginx on host port 80 when running the
      # `nginx` profile. Bind to 127.0.0.1 — admin UI should not be
      # exposed on the LAN; SSH-tunnel or use a VPN if you need remote
      # access.
      - "127.0.0.1:8053:80/tcp"
    environment:
      TZ: ${TZ:-Etc/UTC}
      # Admin password — must be set or the web UI shows a random one
      # at first boot. up.sh asks the user to set this in .env.
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD:-changeme}
      # Upstream DNS — derived from UPSTREAM_PROFILE in .env; up.sh
      # writes these. Family-safe by default.
      FTLCONF_dns_upstreams: "${UPSTREAM_DNS_1:-1.1.1.3};${UPSTREAM_DNS_2:-1.0.0.3}"
      # Listen on all interfaces inside the container — Docker NATs to
      # the host port 53 either way, but Pi-hole defaults to "local" mode
      # which rejects queries from outside its own network namespace.
      FTLCONF_dns_listeningMode: "ALL"
      # Custom DNS records for the JaViSWo aliases. Pi-hole v6 reads
      # these directly from the env (semicolon-separated). HOST_IP comes
      # from .env via docker compose substitution.
      FTLCONF_dns_hosts: "${HOST_IP} javiswo.local;${HOST_IP} cockpit.local;${HOST_IP} jarvis.local"
      # Disable DHCP — we only want Pi-hole as a DNS resolver, not a
      # DHCP server (your router already does DHCP).
      FTLCONF_dhcp_active: "false"
    volumes:
      # Pi-hole config + adlists + custom DNS records persist here.
      # up.sh writes ./pihole/etc-pihole/custom.list (JaViSWo aliases)
      # BEFORE starting the container — Pi-hole reads it on boot.
      - ./pihole/etc-pihole:/etc/pihole
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - CHOWN
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 -p 53 javiswo.local +short +time=2 +tries=1 | grep -q '^[0-9]'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Optional — bring up with `--profile nginx`. Terminates TLS on 443
  # using the mkcert-signed cert from ~/.cockpit/tls/, proxies everything
  # to the Node cockpit running on host port 8787.
  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    container_name: javiswo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/javiswo.conf:/etc/nginx/conf.d/javiswo.conf:ro
      - ${HOME}/.cockpit/tls:/etc/nginx/tls:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - dns
