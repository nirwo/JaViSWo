# JaViSWo — Docker DNS + reverse proxy
#
# Two services:
#   - dns:   dnsmasq that resolves javiswo.local / cockpit.local /
#            jarvis.local → this Mac's LAN IP. Forwards everything else
#            upstream so it can act as the LAN's general DNS server.
#   - nginx: optional reverse proxy that terminates TLS on port 443
#            and forwards to the Node cockpit at host:8787. Brought up
#            with `docker compose --profile nginx up -d`.
#
# Configure HOST_IP in .env (copy .env.example to .env first). The
# setup-network.sh script does this automatically.
#
# Usage:
#   cd docker
#   ./up.sh                                    # DNS only
#   docker compose --profile nginx up -d       # DNS + nginx on 443
#   docker compose down                        # tear everything down

services:
  dns:
    image: jpillora/dnsmasq:1.1.0
    container_name: javiswo-dns
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      # Optional web UI for dnsmasq stats — auth required if exposed.
      - "127.0.0.1:5380:8080"
    environment:
      HTTP_USER: admin
      HTTP_PASS: ${DNS_ADMIN_PASS:-changeme}
    # Forwarding rules:
    #
    #   1. JaViSWo aliases (javiswo.local, cockpit.local, jarvis.local)
    #      → answered locally with ${HOST_IP}.
    #
    #   2. SCOPED router lookups — only queries for the router's local
    #      domains (.lan, .home.arpa, in-addr.arpa for private subnets)
    #      go to ${ROUTER_IP}. That keeps router-local records (nas.lan,
    #      printer.lan, smart-home device names) working WITHOUT routing
    #      general internet queries through your ISP's unfiltered DNS.
    #
    #   3. General internet queries → ${UPSTREAM_DNS_1} and
    #      ${UPSTREAM_DNS_2} (family-safe by default — Cloudflare 1.1.1.3
    #      + AdGuard 94.140.14.15). These block malware + phishing +
    #      adult content + ads. Switch profile in .env.
    command: >
      --log-facility=-
      --address=/javiswo.local/${HOST_IP}
      --address=/cockpit.local/${HOST_IP}
      --address=/jarvis.local/${HOST_IP}
      --server=/lan/${ROUTER_IP}
      --server=/home.arpa/${ROUTER_IP}
      --server=/in-addr.arpa/${ROUTER_IP}
      --server=${UPSTREAM_DNS_1:-1.1.1.3}
      --server=${UPSTREAM_DNS_2:-94.140.14.15}
      --no-resolv
      --no-hosts
      --domain-needed
      --bogus-priv
      --cache-size=1000
    cap_add:
      - NET_ADMIN
    healthcheck:
      # dnsmasq inside the container — query for one of our anchors. If
      # it doesn't answer in 5s, the container is unhealthy and Docker
      # restarts it.
      test: ["CMD-SHELL", "nslookup javiswo.local 127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional — bring up with `--profile nginx`. Terminates TLS on 443
  # using the mkcert-signed cert from ~/.cockpit/tls/, proxies everything
  # to the Node cockpit running on host port 8787.
  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    container_name: javiswo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/javiswo.conf:/etc/nginx/conf.d/javiswo.conf:ro
      - ${HOME}/.cockpit/tls:/etc/nginx/tls:ro
    extra_hosts:
      # Lets nginx upstream block use `host.docker.internal` to reach the
      # Node cockpit running on the Mac itself. Docker Desktop wires this
      # automatically; this entry pins it in case the host network mode
      # is changed later.
      - "host.docker.internal:host-gateway"
    depends_on:
      - dns
