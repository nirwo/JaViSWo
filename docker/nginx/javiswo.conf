# nginx config inside the javiswo-nginx container.
# This terminates TLS on 443 and proxies everything to the Node cockpit
# running on the Mac at host.docker.internal:8787.
#
# Cert + key are bind-mounted from ~/.cockpit/tls/ on the host into
# /etc/nginx/tls/ in the container.

upstream cockpit_upstream {
    server host.docker.internal:8787;
    keepalive 64;
}

# Plain HTTP → redirect to canonical HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://javiswo.local$request_uri;
}

# HTTPS by IP / non-canonical hostname → redirect to canonical.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;

    return 301 https://javiswo.local$request_uri;
}

# Canonical server — javiswo.local / cockpit.local / jarvis.local.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name javiswo.local cockpit.local jarvis.local;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 32m;
    proxy_read_timeout    900;
    proxy_send_timeout    900;
    proxy_connect_timeout 30;

    # WebSocket envelope stream — 24h timeout so long Claude sessions
    # don't drop.
    location /ws {
        proxy_pass http://cockpit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Preview iframes.
    location /preview/ {
        proxy_pass http://cockpit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else.
    location / {
        proxy_pass http://cockpit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
