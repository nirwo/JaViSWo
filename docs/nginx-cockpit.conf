# JaViSWo — nginx reverse-proxy config for the home cockpit.
#
# Place this file at:
#     /opt/homebrew/etc/nginx/servers/nginx-cockpit.conf   (Apple Silicon)
#     /usr/local/etc/nginx/servers/nginx-cockpit.conf      (Intel)
#
# Then edit the SERVER_NAME and SSL_* paths below to match your setup
# (the hostname your Mac uses for Bonjour, and the mkcert-signed cert
# generated by scripts/setup-network.sh), and run:
#     sudo nginx -t                       # test config
#     sudo brew services start nginx      # start (or 'restart')
#
# After that, https://javiswo.local works on any device on the LAN with
# no port and no SSL warning (the device must trust the mkcert root CA;
# Mac is automatic via setup-network.sh, iPhone needs the .pem install
# step printed at the end of that script).

# Redirect plain HTTP to HTTPS so links to http://javiswo.local don't 404.
server {
    listen 80;
    listen [::]:80;
    server_name javiswo.local cockpit.local jarvis.local;
    return 301 https://$host$request_uri;
}

# Main HTTPS server — terminates TLS, proxies to the Node cockpit on
# 127.0.0.1:8787, handles WebSocket upgrade for /ws.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Edit these to match your hostname.
    server_name javiswo.local cockpit.local jarvis.local;

    # mkcert-signed cert generated by scripts/setup-network.sh.
    # If your $HOME isn't /Users/<you>, fix the paths.
    ssl_certificate     /Users/REPLACE_ME/.cockpit/tls/cert.pem;
    ssl_certificate_key /Users/REPLACE_ME/.cockpit/tls/key.pem;

    # Modern TLS only.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Generous body size — voice POSTs can carry seconds of opus audio.
    client_max_body_size 32m;

    # Long upstream timeouts — Claude CLI streams can take minutes.
    proxy_read_timeout    900;
    proxy_send_timeout    900;
    proxy_connect_timeout 30;

    # WebSocket: /ws is the cockpit's envelope stream — must keep the
    # connection open and forward Upgrade/Connection headers verbatim.
    location /ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # 24h — chat sessions can be long
    }

    # Preview iframes proxy to per-project upstream servers; they sometimes
    # use WebSocket for HMR but the cockpit doesn't forward HMR (see http.ts).
    # Standard HTTP proxy is fine here — the inner cockpit handles dispatch.
    location /preview/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else.
    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;     # stream chunked responses (NDJSON)
    }
}
